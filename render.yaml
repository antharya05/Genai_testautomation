# Render blueprint — deploys the FastAPI backend (web) + durable-job worker.
# RAG is disabled here so the build skips the heavy torch/chromadb stack and the
# service fits the free tier. Flip RAG_ENABLED=true (and switch to a plan with
# more memory) to enable retrieval-augmented generation.

# ── Shared env group ──────────────────────────────────────────────────────────
# Values that MUST be identical across the web service and the worker live here,
# so the Blueprint guarantees one shared value instead of two that can drift.
envVarGroups:
  - name: testgen-shared
    envVars:
      # The DB is the durable job queue — the API enqueues, the worker claims.
      # Both processes MUST point at the SAME PostgreSQL instance (SQLite cannot
      # be shared across processes). Provision a Render PostgreSQL and paste its
      # Internal URL once here.
      - key: DATABASE_URL
        sync: false
      # Encrypts BYOK provider keys at rest. The worker decrypts the same keys the
      # API encrypts, so this MUST be one shared value. Use a long random string;
      # rotating it invalidates all stored provider keys.
      - key: KEY_ENCRYPTION_SECRET
        sync: false

services:
  - type: web
    name: testgen-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Release-phase schema migration: Alembic is the single source of truth, so
    # the schema is brought to head before the server starts. ``upgrade head`` is
    # idempotent — a no-op when already current.
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Shared DATABASE_URL + KEY_ENCRYPTION_SECRET (see env group above).
      - fromGroup: testgen-shared
      - key: RAG_ENABLED
        value: "false"
      - key: PROVIDER
        value: anthropic
      # Production mode: the app FAILS TO BOOT if any security-critical secret is
      # missing/insecure or DATABASE_URL is SQLite (see config.validate_config).
      - key: APP_ENV
        value: production
      # ── Security (P0) — set in the Render dashboard ───────────────────────
      # Shared login password for the legacy single-tenant gate.
      - key: APP_PASSWORD
        sync: false
      # Signs bearer tokens. Generated automatically; rotating it logs everyone out.
      - key: AUTH_SECRET
        generateValue: true
      # Comma-separated list of allowed frontend origins (CORS). No wildcards in
      # production. e.g. https://testgen-frontend.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false
      # ── Identity / OAuth (Phase 4.6) — set in the Render dashboard ─────────
      # Public base URL of THIS backend. Used to build OAuth redirect URIs
      # (<APP_BASE_URL>/auth/oauth/<provider>/callback) — must be the real https
      # URL in production, not the localhost default. e.g. https://testgen-backend.onrender.com
      - key: APP_BASE_URL
        sync: false
      # Public URL of the frontend. Where OAuth completes and where password-reset
      # / email-verification links point. e.g. https://testgen-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false
      # A provider's sign-in button appears only when BOTH its id and secret are
      # set. Register the production redirect URI in each provider console:
      #   <APP_BASE_URL>/auth/oauth/<provider>/callback
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Optional — leave unset to hide the Microsoft button.
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false

  # Durable-job worker (Phase 2B): claims and runs generation jobs out of the
  # shared PostgreSQL queue. Generation no longer runs in the web process.
  - type: worker
    name: testgen-worker
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m worker
    envVars:
      # Inherits the SAME DATABASE_URL + KEY_ENCRYPTION_SECRET as the web service.
      - fromGroup: testgen-shared
      - key: RAG_ENABLED
        value: "false"
      - key: PROVIDER
        value: anthropic
