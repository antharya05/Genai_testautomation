name: backend-tests

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # The test suite pins these in conftest.py too; set here as defence-in-depth.
      RAG_ENABLED: "false"
      APP_PASSWORD: "ci-test-pass"
      AUTH_SECRET: "ci-auth-secret"
      KEY_ENCRYPTION_SECRET: "ci-enc-secret"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (runtime + dev; RAG stack excluded)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Dependency vulnerability audit (Phase 5)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln PYSEC-0000-0000 || echo "::warning::pip-audit reported advisories"

      - name: Run tests with coverage
        run: |
          pytest --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=55

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          if-no-files-found: ignore

  # Phase 1: migrations are the single source of truth, so they must apply
  # cleanly — forward and back — on BOTH backends the platform supports.
  migrations:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testgen
          POSTGRES_PASSWORD: testgen
          POSTGRES_DB: testgen
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Migrations round-trip on SQLite
        env:
          DATABASE_URL: "sqlite:///./ci_migrations.db"
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Migrations round-trip on PostgreSQL
        env:
          DATABASE_URL: "postgresql+psycopg2://testgen:testgen@localhost:5432/testgen"
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
